name: Build
on:
  release:
    types: [published] # Fixes the multiple build issue

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug Git Information
        run: |
          git rev-parse --short HEAD
          git describe --tags --exact-match || echo "No exact tag"
          git status

      - name: Pre-clean Docker space
        run: |
          docker system prune -af || true
          docker volume prune -f || true
          sudo rm -rf /var/lib/apt/lists/* || true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/bioinformaticsgoldstandard/prova
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # Fixes the "unknown blob" error

      - name: Clean up Docker space
        if: always()
        run: |
          docker system prune -af || true
          docker volume prune -f || true
